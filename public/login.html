<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — BELÚ System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-logo">
        <img src="/img/logo_belu.png" alt="Belú Chicharronería" class="logo-img logo-img-login">
        <p>Sistema de Gestión Unificado</p>
      </div>

      <div id="loginError" class="login-error"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" placeholder="Tu usuario" autocomplete="username" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="btnLogin">
          Ingresar al Sistema
        </button>
      </form>

      <p style="text-align:center; margin-top:25px; font-size:0.78em; color:var(--text-muted);">
        v1.0 &nbsp;•&nbsp; 2026
      </p>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      const errBox = document.getElementById('loginError');
      errBox.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Ingresando...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value
          })
        });

        const data = await res.json();

        if (data.ok) {
          window.location.href = data.redirect || '/';
        } else {
          errBox.textContent = data.mensaje || 'Error al iniciar sesión.';
          errBox.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Ingresar al Sistema';
        }
      } catch {
        errBox.textContent = 'No se pudo conectar con el servidor.';
        errBox.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Ingresar al Sistema';
      }
    });
  </script>
</body>
</html>
