<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <style>
      .bg { fill: #0b0d12; }
      .card { fill: #121620; stroke: #242a38; stroke-width: 1; }
      .title { font: 700 28px 'Segoe UI', sans-serif; fill: #edf1fb; }
      .sub { font: 500 14px 'Segoe UI', sans-serif; fill: #8d96ac; }
      .th { font: 700 13px 'Segoe UI', sans-serif; fill: #cfd7ef; }
      .td { font: 500 13px 'Segoe UI', sans-serif; fill: #e8eeff; }
      .muted { fill: #9aa6c7; }
      .line { stroke: #1f2534; stroke-width: 1; }
      .lotebadge { font: 700 11px 'Segoe UI', sans-serif; fill: #d8e2ff; }
      .small { font: 500 12px 'Segoe UI', sans-serif; fill: #9aa6c7; }
      .total { font: 700 13px 'Segoe UI', sans-serif; fill: #a9bcff; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="820"/>
  <rect x="40" y="36" width="1320" height="748" rx="14" class="card"/>

  <text x="76" y="86" class="title">Compras - Historial (muestra de lotes)</text>
  <text x="76" y="114" class="sub">Objetivo visual: filas ingresadas juntas en un lote con fondo muy tenue y separador sutil</text>

  <!-- header -->
  <rect x="72" y="146" width="1256" height="44" rx="8" fill="#0e131d" stroke="#242a38"/>
  <text x="90" y="173" class="th">Fecha/Hora</text>
  <text x="250" y="173" class="th">Proveedor</text>
  <text x="430" y="173" class="th">Producto</text>
  <text x="630" y="173" class="th">Pago</text>
  <text x="725" y="173" class="th">Peso</text>
  <text x="810" y="173" class="th">P. Unit</text>
  <text x="920" y="173" class="th">Total</text>
  <text x="1020" y="173" class="th">Pagado</text>
  <text x="1110" y="173" class="th">Nota</text>

  <!-- LOTE A -->
  <rect x="72" y="202" width="1256" height="138" rx="10" fill="rgba(123, 169, 255, 0.08)"/>
  <rect x="72" y="202" width="4" height="138" fill="#7ba9ff" opacity="0.5"/>
  <rect x="84" y="210" width="182" height="20" rx="10" fill="rgba(123, 169, 255, 0.16)"/>
  <text x="96" y="224" class="lotebadge">LOTE 14-04-2026 09:31:xx</text>

  <line x1="84" y1="242" x2="1320" y2="242" class="line"/>
  <line x1="84" y1="278" x2="1320" y2="278" class="line"/>

  <text x="90" y="264" class="td">14-04-2026 09:31:02</text>
  <text x="250" y="264" class="td">Distribuidora Norte</text>
  <text x="430" y="264" class="td">Pollo entero</text>
  <text x="630" y="264" class="td">Efectivo</text>
  <text x="725" y="264" class="td">18.50 kg</text>
  <text x="810" y="264" class="td">S/ 9.80</text>
  <text x="920" y="264" class="total">S/ 181.30</text>
  <text x="1035" y="264" class="td">Si</text>
  <text x="1110" y="264" class="small">Lote DKP manana</text>

  <text x="90" y="300" class="td">14-04-2026 09:31:06</text>
  <text x="250" y="300" class="td">Distribuidora Norte</text>
  <text x="430" y="300" class="td">Pechuga</text>
  <text x="630" y="300" class="td">Efectivo</text>
  <text x="725" y="300" class="td">12.00 kg</text>
  <text x="810" y="300" class="td">S/ 13.20</text>
  <text x="920" y="300" class="total">S/ 158.40</text>
  <text x="1035" y="300" class="td">Si</text>
  <text x="1110" y="300" class="small">Lote DKP manana</text>

  <text x="90" y="336" class="td">14-04-2026 09:31:10</text>
  <text x="250" y="336" class="td">Distribuidora Norte</text>
  <text x="430" y="336" class="td">Ala</text>
  <text x="630" y="336" class="td">Efectivo</text>
  <text x="725" y="336" class="td">9.40 kg</text>
  <text x="810" y="336" class="td">S/ 7.40</text>
  <text x="920" y="336" class="total">S/ 69.56</text>
  <text x="1035" y="336" class="td">No</text>
  <text x="1110" y="336" class="small">Lote DKP manana</text>

  <!-- LOTE B -->
  <rect x="72" y="358" width="1256" height="102" rx="10" fill="rgba(111, 214, 168, 0.08)"/>
  <rect x="72" y="358" width="4" height="102" fill="#6fd6a8" opacity="0.5"/>
  <rect x="84" y="366" width="184" height="20" rx="10" fill="rgba(111, 214, 168, 0.16)"/>
  <text x="96" y="380" class="lotebadge">LOTE 14-04-2026 11:12:xx</text>

  <line x1="84" y1="398" x2="1320" y2="398" class="line"/>

  <text x="90" y="420" class="td">14-04-2026 11:12:15</text>
  <text x="250" y="420" class="td">Mercado Sur</text>
  <text x="430" y="420" class="td">Menudencia</text>
  <text x="630" y="420" class="td">Banco</text>
  <text x="725" y="420" class="td">22.00 kg</text>
  <text x="810" y="420" class="td">S/ 4.20</text>
  <text x="920" y="420" class="total">S/ 92.40</text>
  <text x="1035" y="420" class="td">Si</text>
  <text x="1110" y="420" class="small">Lote DKP tarde</text>

  <text x="90" y="456" class="td">14-04-2026 11:12:18</text>
  <text x="250" y="456" class="td">Mercado Sur</text>
  <text x="430" y="456" class="td">Higado</text>
  <text x="630" y="456" class="td">Banco</text>
  <text x="725" y="456" class="td">7.50 kg</text>
  <text x="810" y="456" class="td">S/ 8.50</text>
  <text x="920" y="456" class="total">S/ 63.75</text>
  <text x="1035" y="456" class="td">No</text>
  <text x="1110" y="456" class="small">Lote DKP tarde</text>

  <!-- normal rows (no lote) -->
  <rect x="72" y="478" width="1256" height="44" rx="8" fill="rgba(255,255,255,0.01)"/>
  <text x="90" y="506" class="td">13-04-2026 18:01:43</text>
  <text x="250" y="506" class="td">Proveedor X</text>
  <text x="430" y="506" class="td">Transporte</text>
  <text x="630" y="506" class="td">Yape</text>
  <text x="725" y="506" class="td">-</text>
  <text x="810" y="506" class="td">-</text>
  <text x="920" y="506" class="total">S/ 40.00</text>
  <text x="1035" y="506" class="td">Si</text>
  <text x="1110" y="506" class="small">Compra individual</text>

  <rect x="72" y="532" width="1256" height="220" rx="10" fill="#0e131d" stroke="#20283a"/>
  <text x="92" y="560" class="th">Criterio visual propuesto</text>
  <text x="92" y="588" class="small">1) Si varias filas consecutivas comparten fecha + hora cercana + proveedor + pago, se consideran lote.</text>
  <text x="92" y="614" class="small">2) Cada lote recibe fondo tenue distinto (opacidad muy baja) y una franja lateral fina.</text>
  <text x="92" y="640" class="small">3) El bloque muestra una etiqueta LOTE con timestamp de referencia para lectura rapida.</text>
  <text x="92" y="666" class="small">4) Filas sueltas se mantienen sin color para no confundir con ingresos en bloque.</text>
  <text x="92" y="702" class="sub">Esta es solo una maqueta visual: no modifica comportamiento ni datos actuales.</text>
</svg>
